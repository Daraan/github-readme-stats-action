name: PRS Unit Tests

on:
  push:
    paths:
      - prs.js
      - index.js
      - action.yml
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --ignore-scripts
        shell: bash
      - name: Run prs.js unit tests
        run: npm test tests/prs.test.js
        shell: bash
